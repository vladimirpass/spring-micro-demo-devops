services:
  postgres:
    image: postgres:15-alpine
    container_name: user-service-postgres
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - microservices-net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - microservices-net


  eureka-server:
    environment:
      EUREKA_PORT: 8081
    build:
      context: "../eureka-server"
      dockerfile: Dockerfile
    ports:
      - "${EUREKA_PORT}:${EUREKA_PORT}"
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s


  config-server:
    environment:
      CONFIGURATION_PORT: 8888
    build:
      context: "../config-server"
      dockerfile: Dockerfile
    ports:
      - "${CONFIGURATION_PORT}:${CONFIGURATION_PORT}"
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s



  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: ../api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8765:8765"
    depends_on:
      - eureka-server
      - config-server
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8090/actuator/health  exit 0"]
      interval: 15s
      timeout: 10s
      retries: 20

  eureka-client:
    build:
      context: "../eureka-client"
      dockerfile: Dockerfile
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    ports:
      - "8089:8089"
    environment:
      SPRING_PROFILES_ACTIVE: docker  # В Docker используем docker-профиль
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
    networks:
      - microservices-net



  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
      - config-server
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8081/actuator/health  exit 0"]
      interval: 20s
      timeout: 10s
      retries: 15

volumes:
  postgres_data:

networks:
  microservices-net:
    driver: bridge