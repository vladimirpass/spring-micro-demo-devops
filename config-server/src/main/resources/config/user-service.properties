eureka.client.service-url.defaultZone=http://eureka-server:8081/eureka
spring.datasource.url=jdbc:postgresql://postgres:5432/skillbox
spring.datasource.username=skillbox
spring.datasource.password=skillbox
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.kafka.bootstrap-servers=kafka:29092
resilience4j.circuitbreaker.instances.kafkaService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.kafkaService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.kafkaService.waitDurationInOpenState=10000
resilience4j.circuitbreaker.instances.kafkaService.permittedNumberOfCallsInHalfOpenState=2
resilience4j.circuitbreaker.instances.kafkaService.automaticTransitionFromOpenToHalfOpenEnabled=true