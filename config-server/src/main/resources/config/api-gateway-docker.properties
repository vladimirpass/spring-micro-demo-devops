eureka.client.service-url.defaultZone=http://eureka-server:8081/eureka

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webflux.routes[0].id=notification-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/kafka/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=0

spring.cloud.gateway.server.webflux.routes[1].id=user-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/users/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=StripPrefix=0